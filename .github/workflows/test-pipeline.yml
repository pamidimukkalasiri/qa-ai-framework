name: QA AI Framework Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Step 1 - Get your code
      - name: Checkout code
        uses: actions/checkout@v4
      # Step 2 - Setup Python
      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      # Step 3 - Cache dependencies
      # Speeds up pipeline significantly
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
      # Step 4 - Install dependencies
      - name: Install dependencies
        run: |
          python --version
          pip --version
          python -m pip install --upgrade pip
          pip install -r requirements.txt -v
      # Install system dependencies
      - name: Install Playwright system deps
        run: python -m playwright install-deps chromium
      # Step 5 - Install Playwright browsers
      - name: Install Playwright browsers
        run: playwright install chromium
      # Step 6 - Create folders before tests run
      - name: Create report folders
        run: |
          mkdir -p allure-results
          mkdir -p reports/traces
      # Step 7 - Run Tests
      - name: Run UI tests
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python -m pytest tests/ui/ \
            --alluredir=allure-results \
            -v \
            --tb=short \
            -n 2
        continue-on-error: true
      # Step 8 -  Upload Allure results
      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30
      # Step 9 - Upload test reports
      - name: Upload trace files
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-traces
          path: reports/traces/
          retention-days: 7